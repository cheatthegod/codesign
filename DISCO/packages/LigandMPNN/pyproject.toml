[project]
name = "LigandMPNN"
version = "0.1.0"
description = "LigandMPNN package"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "LigandMPNN/__init__.py"
"data_utils.py" = "LigandMPNN/data_utils.py"
"model_utils.py" = "LigandMPNN/model_utils.py"
"run.py" = "LigandMPNN/run.py"
"sc_utils.py" = "LigandMPNN/sc_utils.py"
"score.py" = "LigandMPNN/score.py"
"openfold" = "LigandMPNN/openfold"
