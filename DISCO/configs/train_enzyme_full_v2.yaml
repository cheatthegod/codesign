# @package _global_
#
# DISCO Full Enzyme Training V2 - Maximum Data Coverage
# Strategy: use max_length=384 (covers 79K/132K = 60% of enzymes)
#           with crop_size=384 (no cropping needed)
# Resume from previous 50K-step checkpoint
#
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Resume from 50K checkpoint ---
load_checkpoint_path: ./train_output_enzyme_full/checkpoints/disco_step_50000_final.pt
load_strict: false
deterministic: false
bb_only: true

# --- Fabric ---
use_fabric: True

# --- Prot2Text Enzyme Data (maximum coverage) ---
prot2text_csv: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/enzyme_filter_uniprot/enzyme_gold.csv
prot2text_pdb_dir: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/alphafold_structures/pdb
train_data_dir: null
train_metadata_path: null

# max_length=384 covers 80K enzymes (60% of all enzyme_gold)
# Gradient checkpointing on pairformer keeps peak memory ~7GB
# (cropping is buggy for >crop_size, so keep max_length = crop_size)
min_length: 64
max_length: 384
gradient_checkpointing: true
enzyme_only: false
train_split: null

# Crop long proteins to 384 tokens (paper Table S1: crop_size=384)
crop_size: 384
num_workers: 4
prefetch_factor: 2

# --- Batch sizes ---
per_gpu_batch_size: 1
gradient_accumulation_steps: 8  # larger effective batch for stability

seq_diffusion_batch_size: 8
struct_diffusion_batch_size: 8

# --- Training ---
# 80K samples, ~2 full passes = 160K steps / grad_accum 8 = 20K optimizer steps
max_steps: 100000
log_every_n_steps: 20
save_every_n_steps: 10000
eval_every_n_steps: 20000
output_dir: ./train_output_enzyme_v2

# --- Optimizer (conservative for larger proteins) ---
optimizer:
  lr: 0.00005
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler ---
scheduler:
  warmup_steps: 2000
  warmup_type: linear
  decay_factor: 0.95
  decay_every_n_steps: 25000

# --- Gradient clipping ---
gradient_clip_norm: 5.0

# --- EMA ---
ema_decay: 0.999

# --- Loss weights (keep what worked) ---
loss_weights:
  seq: 0.5
  mse: 4.0
  smooth_lddt: 6.0
  distogram: 0.05

# --- Noise ---
noise:
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  seq_noise_min: 0.0
  seq_noise_max: 1.0

# --- Augmentation ---
use_se3_augmentation: false
occupancy_threshold: 0.9

# --- Precision ---
dtype: "32-true"
seed: 42

# --- Paths ---
dump_dir: ${output_dir}

# --- Model overrides ---
use_deepspeed_evo_attention: false
use_memory_efficient_kernel: false
use_lma: false
blocks_per_ckpt: null

# --- Inference settings ---
inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy
eval_version: unconditional
