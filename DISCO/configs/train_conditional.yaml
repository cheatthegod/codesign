# @package _global_
#
# DISCO Conditional Training - Protein-Ligand Complexes from PDB
# This is the STANDARD DISCO training: protein + ligand co-diffusion.
# 52,786 PDB complexes from Prot2Text enzyme mapping.
#
# v2: Fresh start from enzyme_v3 EMA base with paper-aligned hyperparameters.
#     Fixes: seq noise capping, loss weights, lr, grad clip, decay schedule.
#
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Initialize from enzyme_v3 EMA (model weights only, fresh optimizer, step=0) ---
load_checkpoint_path: ./train_output_enzyme_v3/checkpoints/disco_ema_step_60000.pt
load_strict: false
deterministic: false
bb_only: true
use_fabric: True

# --- Cached PDB Complex Data (pre-featurized .pt files) ---
cache_dir: ./local_data/pdb_cache
complex_pdb_dir: ./local_data/pdb_complexes
complex_mapping_csv: ./local_data/enzyme_train.csv
# No prot2text_csv - use PDB complexes instead
prot2text_csv: null
train_data_dir: null
train_metadata_path: null

# Protein length range
min_length: 30
max_length: 1024
require_ligand: true
train_split: train

# Crop to 384 tokens (paper standard)
# 4-GPU DDP training
use_ddp: true
crop_size: 384
gradient_checkpointing: true
num_workers: 8
prefetch_factor: 4

# --- Batch ---
per_gpu_batch_size: 2
gradient_accumulation_steps: 4

seq_diffusion_batch_size: 8
struct_diffusion_batch_size: 8

# --- Training ---
max_steps: 100000
log_every_n_steps: 50
save_every_n_steps: 10000
eval_every_n_steps: 20000
output_dir: ./train_output_conditional

# --- Optimizer (paper Table S1: lr=1.8e-4) ---
optimizer:
  lr: 0.00015
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler (paper: decay every 50K steps) ---
scheduler:
  warmup_steps: 2000
  warmup_type: linear
  decay_factor: 0.95
  decay_every_n_steps: 50000

gradient_clip_norm: 10.0
ema_decay: 0.999

# --- Loss weights (paper Table S1) ---
loss_weights:
  seq: 1.0
  mse: 4.0
  smooth_lddt: 4.0
  distogram: 0.03

# --- Noise ---
noise:
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  seq_noise_min: 0.0
  seq_noise_max: 0.95

use_se3_augmentation: false
occupancy_threshold: 0.9
dtype: "32-true"
seed: 42
dump_dir: ${output_dir}

use_deepspeed_evo_attention: false
use_memory_efficient_kernel: false
use_lma: false
blocks_per_ckpt: null

inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy
eval_version: unconditional
