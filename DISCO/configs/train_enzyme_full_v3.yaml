# @package _global_
#
# DISCO Full Enzyme Training V3 - ALL 132K enzymes
# Fixed crop bug → now handles all protein lengths (64-1024 aa)
# Crop to 384 tokens (paper Table S1), gradient checkpointing enabled
# Resume from V2 best checkpoint
#
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Resume from V2 checkpoint ---
load_checkpoint_path: ./train_output_enzyme_full/checkpoints/disco_step_50000_final.pt
load_strict: false
deterministic: false
bb_only: true
use_fabric: True

# --- ALL enzyme data (132K samples) ---
prot2text_csv: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/enzyme_filter_uniprot/enzyme_gold.csv
prot2text_pdb_dir: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/alphafold_structures/pdb
train_data_dir: null
train_metadata_path: null

# Full range: all enzyme proteins
min_length: 64
max_length: 1024
enzyme_only: false
train_split: null

# Crop long proteins to 384 tokens (matching paper)
crop_size: 384
gradient_checkpointing: true

num_workers: 4
prefetch_factor: 2

# --- Batch ---
per_gpu_batch_size: 1
gradient_accumulation_steps: 8

seq_diffusion_batch_size: 8
struct_diffusion_batch_size: 8

# --- Training: 132K samples × ~1.5 epochs ---
max_steps: 100000
log_every_n_steps: 50
save_every_n_steps: 10000
eval_every_n_steps: 20000
output_dir: ./train_output_enzyme_v3

# --- Optimizer ---
optimizer:
  lr: 0.00005
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler ---
scheduler:
  warmup_steps: 2000
  warmup_type: linear
  decay_factor: 0.95
  decay_every_n_steps: 30000

gradient_clip_norm: 5.0
ema_decay: 0.999

# --- Loss weights ---
loss_weights:
  seq: 0.5
  mse: 4.0
  smooth_lddt: 6.0
  distogram: 0.05

# --- Noise ---
noise:
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  seq_noise_min: 0.0
  seq_noise_max: 1.0

use_se3_augmentation: false
occupancy_threshold: 0.9
dtype: "32-true"
seed: 42
dump_dir: ${output_dir}

use_deepspeed_evo_attention: false
use_memory_efficient_kernel: false
use_lma: false
blocks_per_ckpt: null

inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy
eval_version: unconditional
