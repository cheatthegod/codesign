# @package _global_
#
# DISCO Full Enzyme Training - Tuned Config
# Based on analysis of previous 5K-step run:
#   - MSE converged well (13→0.17), LDDT (0.79→0.27)
#   - Seq loss has spikes → lower weight, stronger grad clipping
#   - 445 samples overfit → use 17K+ samples with max_length=200
#   - Resume from previous checkpoint for transfer learning
#
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Checkpoint: resume from previous training ---
load_checkpoint_path: ./train_output_enzyme/checkpoints/disco_step_5000_final.pt
load_strict: false
deterministic: false
bb_only: true

# --- Fabric ---
use_fabric: True

# --- Prot2Text Enzyme Data (full) ---
prot2text_csv: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/enzyme_filter_uniprot/enzyme_gold.csv
prot2text_pdb_dir: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/alphafold_structures/pdb
train_data_dir: null
train_metadata_path: null

# Wider length range → 17K+ samples
min_length: 64
max_length: 200
enzyme_only: false
train_split: null

crop_size: 200
num_workers: 4
prefetch_factor: 2

# --- Batch sizes ---
per_gpu_batch_size: 1
# Gradient accumulation: effective batch=4 (smoother gradients, fewer spikes)
gradient_accumulation_steps: 4

seq_diffusion_batch_size: 8
struct_diffusion_batch_size: 8

# --- Training ---
# 17K samples × 3 epochs ≈ 50K steps (with grad accum=4)
max_steps: 50000
log_every_n_steps: 20
save_every_n_steps: 5000
eval_every_n_steps: 10000
output_dir: ./train_output_enzyme_full

# --- Optimizer (tuned) ---
# Lower LR to reduce seq loss spikes (was 0.00018)
optimizer:
  lr: 0.00008
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler ---
# Longer warmup for stability with larger dataset
scheduler:
  warmup_steps: 1000
  warmup_type: linear
  decay_factor: 0.95
  decay_every_n_steps: 15000

# --- Gradient clipping (tighter to handle seq loss spikes) ---
gradient_clip_norm: 5.0

# --- EMA ---
ema_decay: 0.999

# --- Loss weights (tuned) ---
# Reduce seq weight slightly to prevent dominating total loss
# Increase structure weights since MSE converged well
loss_weights:
  seq: 0.5        # was 1.0 - reduce to tame seq loss spikes
  mse: 4.0        # keep same
  smooth_lddt: 6.0 # was 4.0 - push harder on structure quality
  distogram: 0.05  # was 0.03 - slightly higher to improve pair prediction

# --- Noise ---
noise:
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  seq_noise_min: 0.0
  seq_noise_max: 1.0

# --- Augmentation ---
use_se3_augmentation: false
occupancy_threshold: 0.9

# --- Precision: fp32 to avoid bf16 index put issues ---
dtype: "32-true"
seed: 42

# --- Paths ---
dump_dir: ${output_dir}

# --- Model overrides ---
use_deepspeed_evo_attention: false
use_memory_efficient_kernel: false
use_lma: false
blocks_per_ckpt: null

# --- Inference settings (needed for model init) ---
inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy
eval_version: unconditional
