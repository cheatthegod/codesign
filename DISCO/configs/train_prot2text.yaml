# @package _global_
#
# DISCO Training on Prot2Text Data
# Uses AlphaFold structures from Prot2Text dataset for training.
# Supports full dataset (256K proteins) or enzyme-only subset (136K).
#
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Checkpoint ---
# Set to pretrained checkpoint path for fine-tuning, null for training from scratch
load_checkpoint_path: null
load_strict: false
deterministic: false
bb_only: true

# --- Fabric / distributed ---
use_fabric: True

# --- Prot2Text Data ---
# Option 1: Use rfd3_monomer_64_1024/train.csv (pre-filtered, 64-1024 aa, with paths)
prot2text_csv: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/rfd3_monomer_64_1024/train.csv

# Option 2: Use enzyme_gold.csv for enzyme-only training
# prot2text_csv: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/enzyme_filter_uniprot/enzyme_gold.csv

# PDB directory (fallback if 'path' column in CSV is not valid)
prot2text_pdb_dir: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/alphafold_structures/pdb

# Data source (set to null since we use prot2text_csv instead)
train_data_dir: null
train_metadata_path: null

# Filter settings
min_length: 64
max_length: 1024
enzyme_only: false  # Set to true for enzyme-specific training
train_split: null    # null = use all data; or "train" for train split only

# Crop size (Table S1: 384)
crop_size: 384
num_workers: 4
prefetch_factor: 2

# --- Batch sizes ---
per_gpu_batch_size: 1
gradient_accumulation_steps: 1

# Diffusion batch sizes (for internal sampling during loss computation)
seq_diffusion_batch_size: 32
struct_diffusion_batch_size: 96

# --- Training ---
max_steps: 160000
log_every_n_steps: 50
save_every_n_steps: 5000
eval_every_n_steps: 10000
output_dir: ./train_output_prot2text

# --- Optimizer (Table S1: Adam) ---
optimizer:
  lr: 0.00018
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler (Table S1) ---
scheduler:
  warmup_steps: 1000
  warmup_type: linear
  decay_factor: 0.95
  decay_every_n_steps: 50000

# --- Gradient clipping ---
gradient_clip_norm: 10.0

# --- EMA ---
ema_decay: 0.999

# --- Loss weights (Eq. S23) ---
loss_weights:
  seq: 1.0
  mse: 4.0
  smooth_lddt: 4.0
  distogram: 0.03

# --- Noise sampling ---
noise:
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  seq_noise_min: 0.0
  seq_noise_max: 1.0

# --- Data augmentation ---
use_se3_augmentation: true

# --- Occupancy filtering ---
occupancy_threshold: 0.9

# --- Mixed precision ---
dtype: "bf16"

# --- Misc ---
seed: 42

# --- Inference settings (needed for model init) ---
inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy

eval_version: unconditional
