# @package _global_
#
# DISCO Training Configuration
# Reproduces Table S1 from the paper.
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Checkpoint ---
load_checkpoint_path: null
load_strict: false
deterministic: false
bb_only: true

# --- Fabric / distributed ---
use_fabric: True

# --- Data ---
train_data_dir: null  # Path to processed PDB training data (mmCIF/PDB files)
train_metadata_path: null  # Path to metadata CSV/JSON with chain/interface info
crop_size: 384
num_workers: 4
prefetch_factor: 2

# --- Batch sizes (Table S1) ---
# Sequence batch = 32 means 32 sequence diffusion samples per structure
# Structure batch = 96 means 96 structure diffusion samples
# These are the "diffusion_batch_size" used during loss computation
seq_diffusion_batch_size: 32
struct_diffusion_batch_size: 96

# Effective per-GPU batch size (number of proteins per step per GPU)
per_gpu_batch_size: 1
gradient_accumulation_steps: 1

# --- Training ---
max_steps: 160000
log_every_n_steps: 50
save_every_n_steps: 5000
eval_every_n_steps: 10000
output_dir: ./train_output

# --- Optimizer (Table S1: Adam) ---
optimizer:
  lr: 0.00018
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler (Table S1) ---
scheduler:
  warmup_steps: 1000
  warmup_type: linear  # Linear warmup
  decay_factor: 0.95
  decay_every_n_steps: 50000

# --- Gradient clipping ---
gradient_clip_norm: 10.0

# --- EMA ---
ema_decay: 0.999

# --- Loss weights (Eq. S23) ---
loss_weights:
  seq: 1.0         # alpha_seq
  mse: 4.0         # alpha_MSE
  smooth_lddt: 4.0 # alpha_smooth_lddt
  distogram: 0.03  # alpha_distogram

# --- Noise sampling ---
noise:
  # Structure noise: sigma = sigma_data * exp(-1.2 + 1.5 * N(0,1))
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  # Sequence noise: r ~ Uniform(0, 1), mask rate = 1 - r
  seq_noise_min: 0.0
  seq_noise_max: 1.0

# --- Data augmentation ---
# SE(3) augmentation is applied via centre_random_augmentation
use_se3_augmentation: true

# --- Occupancy filtering ---
# Mask out residues with occupancy < 0.9 (paper Section A.5)
occupancy_threshold: 0.9

# --- Mixed precision ---
dtype: "bf16"

# --- Misc ---
seed: 42

# --- Inference settings (needed for model init) ---
inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy

eval_version: unconditional
