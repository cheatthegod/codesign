# @package _global_
#
# DISCO Training on Enzyme-Only Prot2Text Data
# Uses 136K high-confidence enzymes (enzyme_gold) from Prot2Text dataset.
# Ideal for fine-tuning DISCO for enzyme design tasks.
#
defaults:
  - task_manager: default
  - paths: default
  - model: default
  - logger: many_loggers
  - fabric: default
  - structure_encoder: default
  - sequence_sampling_strategy: default
  - _self_

# --- Checkpoint ---
# Fine-tune from pretrained DISCO checkpoint
load_checkpoint_path: pretrained/DISCO.pt
load_strict: false
deterministic: false
bb_only: true

# --- Fabric / distributed ---
use_fabric: True

# --- Prot2Text Enzyme Data ---
prot2text_csv: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/enzyme_filter_uniprot/enzyme_gold.csv
prot2text_pdb_dir: /home/ubuntu/cqr_files/protein_design/COT_enzyme_design/Prot2Text-Data/alphafold_structures/pdb

train_data_dir: null
train_metadata_path: null

# Filter settings
min_length: 64
max_length: 1024
enzyme_only: false  # Already filtered in enzyme_gold.csv
train_split: null    # Use all data (enzyme_gold has its own splits)

crop_size: 384
num_workers: 4
prefetch_factor: 2

# --- Batch sizes ---
per_gpu_batch_size: 1
gradient_accumulation_steps: 1
seq_diffusion_batch_size: 32
struct_diffusion_batch_size: 96

# --- Training (fine-tuning: fewer steps, lower LR) ---
max_steps: 50000
log_every_n_steps: 50
save_every_n_steps: 2000
eval_every_n_steps: 5000
output_dir: ./train_output_enzyme

# --- Optimizer (lower LR for fine-tuning) ---
optimizer:
  lr: 0.00005
  betas: [0.9, 0.95]
  weight_decay: 1.0e-8
  eps: 1.0e-8

# --- Scheduler ---
scheduler:
  warmup_steps: 500
  warmup_type: linear
  decay_factor: 0.95
  decay_every_n_steps: 20000

# --- Gradient clipping ---
gradient_clip_norm: 10.0

# --- EMA ---
ema_decay: 0.999

# --- Loss weights (same as paper) ---
loss_weights:
  seq: 1.0
  mse: 4.0
  smooth_lddt: 4.0
  distogram: 0.03

# --- Noise sampling ---
noise:
  sigma_data: 16.0
  struct_log_mean: -1.2
  struct_log_std: 1.5
  seq_noise_min: 0.0
  seq_noise_max: 1.0

# --- Data augmentation ---
use_se3_augmentation: true
occupancy_threshold: 0.9

# --- Mixed precision ---
dtype: "bf16"
seed: 42

# --- Inference settings (needed for model init) ---
inference_random_transform_ref_pos: true
inference_random_transform_msk_res: ${task_manager.transform_masked_ref_pos}
inference_ref_pos_augment: ${task_manager.ref_pos_augment}
inference_loop_strategy_name: BasicInferenceLoopStrategy
eval_version: unconditional
